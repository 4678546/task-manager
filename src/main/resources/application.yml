spring:
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/task-manager
    username: root
    password: 123456

  data:
    redis:
      host: localhost
      port: 6379
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    mapper-locations: classpath:com/sakura/taskmanager/mapper/*.xml

file:
  upload:
    path: uploads
